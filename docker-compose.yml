services:
  # 📦 One-shot template job.
  # `docker compose up --build` runs this before Kong so new plugin folders become fresh .rock files.
  plugin-packager:
    build:
      context: .
      dockerfile: docker/plugin-packager.Dockerfile
      args:
        INSTALL_NATIVE_BUILD_DEPS: "${INSTALL_NATIVE_BUILD_DEPS:-false}"
    image: local/kong-plugin-packager:3.4.2
    restart: "no"
    volumes:
      - .:/workspace

  echo:
    build:
      context: .
      dockerfile: docker/echo-server.Dockerfile
    image: local/kong-plugins-echo:latest
    container_name: kong-plugins-echo

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.0
    container_name: kong-plugins-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --http-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "${KEYCLOAK_ADMIN:-admin}"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "${KEYCLOAK_ADMIN_PASSWORD:-admin}"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_PORT:-18080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/kong-plugin-lab-realm.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/8080; printf \"GET /realms/kong-plugin-lab HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 12

  kong:
    build:
      context: .
      dockerfile: docker/kong.Dockerfile
      args:
        INSTALL_NATIVE_BUILD_DEPS: "${INSTALL_NATIVE_BUILD_DEPS:-false}"
    image: local/kong-plugins-builder:3.4.2
    container_name: kong-3.4.2-local
    environment:
      LD_LIBRARY_PATH: /usr/local/lib/kong-plugins
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_LUA_PACKAGE_CPATH: "/usr/local/lib/kong-plugins/?.so;/usr/local/lib/kong-plugins/lib?.so;/usr/local/lib/lua/5.1/?.so;/usr/local/lib/lua/5.1/?/init.so;;"
      KONG_LOG_LEVEL: info
      KONG_NATIVE_LIB_DIR: /usr/local/lib/kong-plugins
      KONG_NATIVE_LIBS_SOURCE_DIR: /rocks/native
      KONG_NGINX_MAIN_ENV: LD_LIBRARY_PATH
      KONG_NGINX_HTTP_LUA_SHARED_DICT: kong_saml_jwe_auth_replay 10m
      KONG_NGINX_WORKER_PROCESSES: "1"
      # 🧩 Add your custom plugin names here after `bundled`.
      KONG_PLUGINS: bundled,request-profiler,json-field-guard,canary-header-router,saml-jwe-auth
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_REQUIRE_NATIVE_LIBS: "false"
      KONG_REQUIRE_ROCKS: "true"
      KONG_ROCKS_DIR: /rocks
      KONG_STATUS_LISTEN: 0.0.0.0:8100
    depends_on:
      plugin-packager:
        condition: service_completed_successfully
      echo:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "${KONG_PROXY_PORT:-8000}:8000"
      - "${KONG_PROXY_SSL_PORT:-8443}:8443"
      - "${KONG_ADMIN_PORT:-8001}:8001"
      - "${KONG_STATUS_PORT:-8100}:8100"
    volumes:
      - ./build/out:/rocks:ro
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  newman:
    image: postman/newman:alpine
    profiles:
      - tools
    depends_on:
      kong:
        condition: service_healthy
    volumes:
      - ./tests/postman:/etc/newman:ro
      - ./build/postman:/etc/newman-results
    command:
      - run
      - /etc/newman/Kong_3_4_2_Custom_Plugins.postman_collection.json
      - -e
      - /etc/newman/local.postman_environment.json
      - --env-var
      - proxy_url=http://kong:8000
      - --env-var
      - admin_url=http://kong:8001
      - --env-var
      - status_url=http://kong:8100
      - --reporters
      - cli,json
      - --reporter-json-export
      - /etc/newman-results/newman-results.json
      - --color
      - "on"
