services:
  kong:
    build:
      context: .
      dockerfile: docker/kong.Dockerfile
    image: local/kong-plugins-builder:3.4.2
    container_name: kong-3.4.2-local
    environment:
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_LOG_LEVEL: info
      KONG_NGINX_WORKER_PROCESSES: "1"
      KONG_PLUGINS: bundled,request-profiler,json-field-guard,canary-header-router
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_REQUIRE_ROCKS: "true"
      KONG_ROCKS_DIR: /rocks
      KONG_STATUS_LISTEN: 0.0.0.0:8100
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
      - "8100:8100"
    volumes:
      - ./build/out:/rocks:ro
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
